<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second Page - MakeKits</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #1e3a5f, #0f172a);
      color: #f9fafb;
    }

    main {
      text-align: center;
      padding: 48px 32px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 24px;
      opacity: 0.85;
    }

    a {
      display: inline-block;
      padding: 10px 28px;
      border-radius: 8px;
      background: #3b82f6;
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }

    a:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <main>
    <h1>Route Second Page</h1>
    <p>This is the second page under /route/second.html, also embedded via Webview2.</p>
    <a href="/index.html">← Back to Home</a>
  </main>
</body>
</html>
