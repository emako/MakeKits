<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MakeKits Hello World</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #1f2937, #111827);
      color: #f9fafb;
    }

    main {
      text-align: center;
      padding: 48px 32px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello, MakeKits!</h1>
    <p>此页面来自嵌入式 Resources/helloworld/index.html，由 WebView2 虚拟主机提供。</p>
  </main>
</body>
</html>
